name: comment_ai
description: "CommentAI — AI-powered social media comment assistant by EA Technologies"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # Networking
  http: ^1.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Local storage
  shared_preferences: ^2.3.0

  # In-app purchases
  purchases_flutter: ^7.0.0

  # Image / OCR
  image_picker: ^1.1.0
  google_mlkit_text_recognition: ^0.13.0

  # Overlay (floating bubble)
  flutter_overlay_window: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
