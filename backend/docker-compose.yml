services:
  postgres:
    image: postgres:16-alpine
    container_name: commentai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: commentai
      POSTGRES_PASSWORD: commentai
      POSTGRES_DB: commentai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
